<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍄 给你的小惊喜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

canvas { display: block; }

#controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 110px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 28px;
  background: rgba(0,0,0,0.35);
  z-index: 10;
}

.dpad { display: flex; gap: 10px; }

.btn {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 2.5px solid rgba(255,255,255,0.45);
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
}

.btn.pressed { background: rgba(255,255,255,0.45); }

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.9s ease;
}

#overlay.show {
  opacity: 1;
  pointer-events: all;
  background: rgba(0,0,0,0.88);
}

#overlay img {
  max-width: 88%;
  max-height: 62vh;
  border-radius: 18px;
  box-shadow: 0 0 50px rgba(255, 100, 160, 0.7);
  transform: scale(0.75);
  transition: transform 0.9s cubic-bezier(0.34,1.56,0.64,1);
}

#overlay.show img { transform: scale(1); }

.videoBtn {
  display: inline-block;
  margin-top: 28px;
  padding: 16px 36px;
  background: linear-gradient(135deg, #ff6b9d, #ff4466);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 2px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,80,120,0.7);
  animation: btnPulse 1.6s ease-in-out infinite;
}
.videoBtn:hover { background: linear-gradient(135deg, #ff4466, #ff6b9d); }


@keyframes btnPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,80,120,0.7); }
  50%      { transform: scale(1.06); box-shadow: 0 0 50px rgba(255,80,120,1); }
}

#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  cursor: pointer;
}

#startBox {
  text-align: center;
  animation: pulse 1.8s ease-in-out infinite;
}

.startTitle {
  color: #fff;
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 16px;
  text-shadow: 0 0 20px rgba(255,200,0,0.8);
}

.startSub {
  color: #ffd700;
  font-size: 22px;
  margin-bottom: 10px;
}

.startHint {
  color: rgba(255,255,255,0.55);
  font-size: 14px;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}

.heart {
  position: fixed;
  font-size: 26px;
  pointer-events: none;
  z-index: 1000;
  animation: rise 3.5s ease-in forwards;
}

@keyframes rise {
  0%   { transform: translateY(0) scale(1) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(-240px) scale(0.4) rotate(20deg); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="controls">
  <div class="dpad">
    <div class="btn" id="btnLeft">◀</div>
    <div class="btn" id="btnRight">▶</div>
  </div>
  <div class="btn" id="btnJump">跳</div>
</div>

<div id="startScreen">
  <div id="startBox">
    <div class="startTitle">🍄 给你的小惊喜</div>
    <div class="startSub">点击开始游戏</div>
    <div class="startHint">去找到蘑菇吧 ❤️</div>
  </div>
</div>

<div id="overlay">
  <img src="game.png" alt="惊喜">
  <button class="videoBtn" onclick="playVideo()">点击开启幸福之旅</button>
</div>

<script>
const NOTE_FREQ = {
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,
  'A4':440.00,'As4':466.16,'B4':493.88,
  'C5':523.25,'Cs5':554.37,'D5':587.33,'Ds5':622.25,'E5':659.25,
  'F5':698.46,'Fs5':739.99,'G5':783.99,'Gs5':830.61,'A5':880.00,
  'C6':1046.50,'_':0
};

const MARIO_THEME = [
  ['E5',1],['E5',1],['_',1],['E5',1],['_',1],['C5',1],['E5',2],
  ['G5',4],['_',4],['G4',4],['_',4],
  ['C5',3],['_',1],['G4',2],['_',2],['E4',3],['_',1],
  ['A4',2],['B4',2],['As4',1],['A4',2],
  ['G4',2],['E5',2],['G5',2],
  ['A5',2],['F5',1],['G5',1],['_',1],
  ['E5',2],['C5',1],['D5',1],['B4',3],['_',1],
  ['_',2],['G5',2],['Fs5',1],['F5',1],
  ['Ds5',2],['_',1],['E5',1],['_',1],
  ['Gs5',1],['A5',1],['C5',1],['_',1],['A5',1],['C5',1],['D5',1],
  ['_',2],['G5',2],['Fs5',1],['F5',1],
  ['Ds5',2],['_',1],['E5',1],['_',1],
  ['C6',2],['_',1],['C6',2],['C6',3],
  ['_',2],['G5',2],['Fs5',1],['F5',1],
  ['Ds5',2],['_',1],['E5',1],['_',1],
  ['Gs5',1],['A5',1],['C5',1],['_',1],['A5',1],['C5',1],['D5',1],
  ['Ds5',2],['_',1],['D5',2],['_',1],['C5',4],['_',2],
];

const LOVE_SONG = [
  ['G4',2],['G4',2],['A4',2],['G4',2],['E4',2],['C4',4],['_',2],
  ['G4',2],['G4',2],['A4',2],['G4',2],['D4',4],['_',2],
  ['G4',2],['G4',4],['G5',2],['E5',2],
  ['C5',2],['A4',2],['E4',4],['_',2],
  ['F4',2],['G4',4],['E4',2],['C4',2],['D4',2],['C4',6],['_',2],
  ['G4',2],['G4',2],['A4',2],['G4',2],['E4',2],['C4',4],['_',2],
  ['G4',2],['G4',2],['A4',2],['G4',2],['D4',4],['_',2],
  ['G4',2],['G4',4],['G5',2],['E5',2],
  ['C5',2],['A4',2],['G4',6],['_',2],
  ['F4',2],['G4',4],['E4',2],['C4',2],['D4',2],['C4',6],['_',4],
];

class MusicPlayer {
  constructor() {
    this.actx = null; this.gainNode = null;
    this.oscs = []; this.loopTimer = null; this.ready = false;
  }
  init() {
    if (this.ready) return;
    this.actx = new (window.AudioContext || window.webkitAudioContext)();
    this.gainNode = this.actx.createGain();
    this.gainNode.gain.setValueAtTime(0.22, this.actx.currentTime);
    this.gainNode.connect(this.actx.destination);
    this.ready = true;
  }
  stop() {
    clearTimeout(this.loopTimer);
    this.oscs.forEach(o => { try { o.stop(0); } catch(e){} });
    this.oscs = [];
  }
  play(sequence, bpm, loop = true) {
    this.stop(); this.actx.resume(); this._schedule(sequence, bpm, loop);
  }
  _schedule(sequence, bpm, loop) {
    const beat = 60 / bpm / 2;
    let t = this.actx.currentTime + 0.1, total = 0;
    for (const [note, beats] of sequence) {
      const freq = NOTE_FREQ[note] || 0, dur = beats * beat;
      if (freq > 0) {
        const osc = this.actx.createOscillator(), env = this.actx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(freq, t);
        osc.connect(env); env.connect(this.gainNode);
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.4, t + 0.01);
        env.gain.setValueAtTime(0.35, t + dur * 0.75);
        env.gain.linearRampToValueAtTime(0, t + dur * 0.92);
        osc.start(t); osc.stop(t + dur); this.oscs.push(osc);
      }
      t += dur; total += dur;
    }
    if (loop) this.loopTimer = setTimeout(() => this._schedule(sequence, bpm, true), (total - 0.3) * 1000);
  }
  fadeTo(vol, sec) {
    if (!this.gainNode) return;
    this.gainNode.gain.linearRampToValueAtTime(vol, this.actx.currentTime + sec);
  }
}

const music = new MusicPlayer();
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  music.init();
  music.play(MARIO_THEME, 180);
}

let loveSongTimer = null;

function switchToLoveSong() {
  music.fadeTo(0, 0.8);
  loveSongTimer = setTimeout(() => {
    music.gainNode.gain.setValueAtTime(0, music.actx.currentTime);
    music.gainNode.gain.linearRampToValueAtTime(0.22, music.actx.currentTime + 1.2);
    music.play(LOVE_SONG, 72);
  }, 900);
}

function playVideo() {
  clearTimeout(loveSongTimer);
  music.stop();
  if (music.gainNode) music.gainNode.gain.setValueAtTime(0, music.actx.currentTime);
  document.querySelector('#overlay img').style.display = 'none';
  document.querySelector('.videoBtn').style.display = 'none';
  const vid = document.createElement('video');
  vid.src = '0524(1).mp4';
  vid.controls = true;
  vid.setAttribute('playsinline', '');
  vid.setAttribute('webkit-playsinline', '');
  vid.style.cssText = 'max-width:88%;max-height:62vh;border-radius:18px;margin-top:20px;';
  document.getElementById('overlay').appendChild(vid);
  vid.play();
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CTRL_H = 110;
const W = window.innerWidth;
const H = window.innerHeight - CTRL_H;
canvas.width = W; canvas.height = H;

const GRAVITY = 0.55, JUMP_FORCE = -13, SPEED = 3.8;
const GY = H - 50;

const platforms = [
  { x: 0,       y: GY,       w: W,      h: 50 },
  { x: W*0.05,  y: GY-130,   w: W*0.23, h: 18 },
  { x: W*0.38,  y: GY-210,   w: W*0.22, h: 18 },
  { x: W*0.67,  y: GY-155,   w: W*0.28, h: 18 },
];

const PW = 32, PH = 48;
const player = { x: 20, y: GY-PH, vx: 0, vy: 0, onGround: false, facingRight: true, frame: 0, frameTimer: 0 };

const mushroom = {
  x: platforms[3].x + platforms[3].w / 2 - 20,
  y: platforms[3].y - 52,
  w: 40, h: 52, collected: false,
};

const keys = { left: false, right: false, jump: false };
let prevJump = false;

function setupInput() {
  const btnLeft  = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump  = document.getElementById('btnJump');
  function press(k, btn)   { keys[k] = true;  btn.classList.add('pressed'); }
  function release(k, btn) { keys[k] = false; btn.classList.remove('pressed'); }
  btnLeft.addEventListener('touchstart',  e => { e.preventDefault(); startMusic(); press('left', btnLeft); },   {passive:false});
  btnLeft.addEventListener('touchend',    e => { e.preventDefault(); release('left', btnLeft); },               {passive:false});
  btnRight.addEventListener('touchstart', e => { e.preventDefault(); startMusic(); press('right', btnRight); }, {passive:false});
  btnRight.addEventListener('touchend',   e => { e.preventDefault(); release('right', btnRight); },             {passive:false});
  btnJump.addEventListener('touchstart',  e => { e.preventDefault(); startMusic(); press('jump', btnJump); },   {passive:false});
  btnJump.addEventListener('touchend',    e => { e.preventDefault(); release('jump', btnJump); },               {passive:false});
  btnLeft.addEventListener('mousedown',  () => { startMusic(); press('left', btnLeft); });
  btnLeft.addEventListener('mouseup',    () => release('left', btnLeft));
  btnRight.addEventListener('mousedown', () => press('right', btnRight));
  btnRight.addEventListener('mouseup',   () => release('right', btnRight));
  btnJump.addEventListener('mousedown',  () => press('jump', btnJump));
  btnJump.addEventListener('mouseup',    () => release('jump', btnJump));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')                keys.left  = true;
    if (e.key === 'ArrowRight')               keys.right = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys.jump  = true;
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft')                keys.left  = false;
    if (e.key === 'ArrowRight')               keys.right = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys.jump  = false;
  });
}

function update() {
  if      (keys.left)  { player.vx = -SPEED; player.facingRight = false; }
  else if (keys.right) { player.vx =  SPEED; player.facingRight = true; }
  else                 { player.vx = 0; }
  if (keys.jump && !prevJump && player.onGround) { player.vy = JUMP_FORCE; player.onGround = false; }
  prevJump = keys.jump;
  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;
  player.x = Math.max(0, Math.min(W - PW, player.x));
  player.onGround = false;
  for (const p of platforms) {
    const overlapX = player.x + PW > p.x && player.x < p.x + p.w;
    const feetWas  = player.y + PH - player.vy;
    const feetNow  = player.y + PH;
    if (overlapX && player.vy >= 0 && feetWas <= p.y + 1 && feetNow >= p.y) {
      player.y = p.y - PH; player.vy = 0; player.onGround = true;
    }
  }
  if (player.vx !== 0 && player.onGround) {
    if (++player.frameTimer > 8) { player.frame = 1 - player.frame; player.frameTimer = 0; }
  } else if (player.onGround) { player.frame = 0; }
  if (!mushroom.collected) {
    const hit = player.x + PW > mushroom.x && player.x < mushroom.x + mushroom.w &&
                player.y + PH > mushroom.y && player.y < mushroom.y + mushroom.h;
    if (hit) { mushroom.collected = true; switchToLoveSong(); triggerSurprise(); }
  }
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, GY);
  sky.addColorStop(0, '#3a7bd5'); sky.addColorStop(1, '#87ceeb');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  [[W*0.1,H*0.1,80],[W*0.45,H*0.07,100],[W*0.78,H*0.13,70]].forEach(([cx,cy,r]) => {
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath();
    ctx.arc(cx,          cy,          r*0.42, 0, Math.PI*2);
    ctx.arc(cx + r*0.38, cy - r*0.14, r*0.34, 0, Math.PI*2);
    ctx.arc(cx + r*0.72, cy,          r*0.38, 0, Math.PI*2);
    ctx.fill();
  });
  [[W*0.18,GY],[W*0.55,GY],[W*0.85,GY]].forEach(([tx,ty]) => {
    ctx.fillStyle = '#2d8a00';
    ctx.beginPath(); ctx.moveTo(tx,ty-60); ctx.lineTo(tx-25,ty); ctx.lineTo(tx+25,ty); ctx.fill();
    ctx.fillStyle = '#5aad00';
    ctx.beginPath(); ctx.moveTo(tx,ty-85); ctx.lineTo(tx-18,ty-35); ctx.lineTo(tx+18,ty-35); ctx.fill();
    ctx.fillStyle = '#6b3f1a'; ctx.fillRect(tx-5, ty-10, 10, 10);
  });
  ctx.fillStyle = '#5aad00'; ctx.fillRect(0, GY, W, 18);
  ctx.fillStyle = '#8b5e2e'; ctx.fillRect(0, GY+18, W, 32);
  for (let i = 1; i < platforms.length; i++) {
    const p = platforms[i];
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(p.x+3, p.y+3, p.w, p.h);
    ctx.fillStyle = '#c97a28';          ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#e8953a';          ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.strokeStyle = '#a05a1a'; ctx.lineWidth = 1;
    for (let bx = p.x; bx < p.x + p.w; bx += 22) ctx.strokeRect(bx, p.y, 22, p.h);
  }
}

function drawMushroom() {
  if (mushroom.collected) return;
  const bounce = Math.sin(Date.now() / 350) * 3;
  const x = mushroom.x, y = mushroom.y + bounce;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x+20, mushroom.y+mushroom.h+2, 18, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5deb3'; ctx.fillRect(x+11, y+28, 18, 24);
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = 1; ctx.strokeRect(x+11, y+28, 18, 24);
  ctx.fillStyle = '#e52521';
  ctx.beginPath(); ctx.arc(x+20, y+25, 23, Math.PI, 0); ctx.fill();
  ctx.fillRect(x-4, y+22, 48, 7);
  ctx.strokeStyle = '#a01510'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x+20, y+25, 23, Math.PI, 0); ctx.stroke();
  ctx.fillStyle = 'white';
  [[x+11,y+13,6.5],[x+29,y+13,6.5],[x+20,y+25,4.5]].forEach(([sx,sy,sr]) => {
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = 'rgba(255,255,0,0.85)';
  ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('▼', x+20, y-8+bounce);
}

function drawPlayer() {
  const x = player.x, y = player.y, f = player.frame;
  ctx.save();
  if (!player.facingRight) { ctx.translate(x+PW, 0); ctx.scale(-1,1); ctx.translate(-x, 0); }
  ctx.fillStyle = '#3d1e00';
  if (f === 0) { ctx.fillRect(x+1,y+42,13,6); ctx.fillRect(x+18,y+42,13,6); }
  else         { ctx.fillRect(x-1,y+42,15,6); ctx.fillRect(x+19,y+42,14,6); }
  ctx.fillStyle = '#0044bb';
  ctx.fillRect(x+4,y+32,11,12); ctx.fillRect(x+17,y+32,11,12);
  ctx.fillRect(x+3,y+18,26,16);
  ctx.fillStyle = '#e52521';
  ctx.fillRect(x,y+22,5,10); ctx.fillRect(x+27,y+22,5,10);
  ctx.fillStyle = '#0044bb';
  ctx.fillRect(x+5,y+14,8,6); ctx.fillRect(x+19,y+14,8,6);
  ctx.fillStyle = '#fab98d'; ctx.fillRect(x+4,y+8,24,16);
  ctx.fillStyle = '#e52521';
  ctx.fillRect(x-1,y+5,34,6); ctx.fillRect(x+4,y,24,7);
  ctx.fillStyle = '#000';
  ctx.fillRect(x+9,y+12,4,4); ctx.fillRect(x+19,y+12,4,4);
  ctx.fillStyle = 'white';
  ctx.fillRect(x+11,y+12,2,2); ctx.fillRect(x+21,y+12,2,2);
  ctx.fillStyle = '#5a3000'; ctx.fillRect(x+7,y+19,18,4);
  ctx.restore();
}

function drawHint() {
  if (mushroom.collected) return;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText('🍄 走过去吃掉蘑菇！', W/2, 26);
  ctx.textAlign = 'left';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(); drawMushroom(); drawPlayer(); drawHint();
}

function spawnHeart() {
  const el = document.createElement('div');
  el.className = 'heart';
  el.textContent = ['❤️','💕','💖','💗','💓'][Math.floor(Math.random()*5)];
  el.style.left   = (10 + Math.random()*80) + 'vw';
  el.style.bottom = '120px';
  el.style.animationDuration = (2.5 + Math.random()*2) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function triggerSurprise() {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');
  for (let i = 0; i < 16; i++) setTimeout(spawnHeart, i*120);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  }, { once: true });
}

function loop() {
  if (!mushroom.collected) update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('startScreen').addEventListener('click', function() {
  music.init(); music.play(MARIO_THEME, 180); this.style.display = 'none';
});

setupInput();
loop();
</script>
</body>
</html>
